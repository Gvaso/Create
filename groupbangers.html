<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Groupbangers Chat</title>
    <style>
        /* Strictly Dark Mode & Mobile Beautiful */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #000000; color: #ffffff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Login Screen */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .login-box { background-color: #1c1c1e; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        select, input[type="password"] { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background-color: #2c2c2e; color: white; font-size: 16px; outline: none; }
        .btn { background-color: #0a84ff; color: white; padding: 15px; border: none; border-radius: 10px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:hover { background-color: #007aff; }

        /* Chat Screen */
        #chat-screen { display: none; flex-direction: column; height: 100vh; width: 100%; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #1c1c1e; border-bottom: 1px solid #2c2c2e; }
        .header-title { font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 10px; height: 10px; background-color: #34c759; border-radius: 50%; display: inline-block; }
        .header-icons { display: flex; gap: 20px; font-size: 20px; color: #0a84ff; cursor: pointer; }

        /* Messages Area */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 12px 16px; font-size: 16px; line-height: 1.4; position: relative; }
        .msg-received { background-color: #2c2c2e; align-self: flex-start; border-radius: 20px 20px 20px 5px; }
        .msg-sent { background-color: #0a84ff; align-self: flex-end; border-radius: 20px 20px 5px 20px; }
        .sender-name { font-size: 12px; color: #8e8e93; margin-bottom: 4px; margin-left: 10px; }
        .typing-indicator { font-size: 12px; color: #8e8e93; font-style: italic; align-self: flex-start; display: none; }

        /* Input Area */
        .input-area { display: flex; align-items: center; padding: 10px 15px; background-color: #1c1c1e; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        .action-icon { color: #0a84ff; font-size: 24px; padding: 0 10px; cursor: pointer; }
        .text-input { flex: 1; background-color: #2c2c2e; color: white; border: none; padding: 12px 20px; border-radius: 20px; font-size: 16px; margin: 0 10px; outline: none; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Groupbangers</h2>
            <p style="color: #8e8e93; margin-bottom: 20px; font-size: 14px;">Secure Access Only</p>
            
            <select id="user-select">
                <option value="" disabled selected>Select who you are...</option>
                <option value="Saba">Saba</option>
                <option value="Ilia">Ilia</option>
                <option value="Mate">Mate 🤓</option>
                <option value="Gela">Gela</option>
                <option value="Levani">Levani</option>
            </select>
            
            <input type="password" id="password-input" placeholder="Enter your password">
            <button class="btn" onclick="attemptLogin()">Enter Chat</button>
            <p id="error-msg" style="color: #ff453a; margin-top: 15px; font-size: 14px; display: none;">Incorrect password!</p>
        </div>
    </div>

    <div id="chat-screen">
        <div class="header">
            <div class="header-title">
                <span class="status-dot"></span>
                Groupbangers
            </div>
            <div class="header-icons">
                <span onclick="alert('Voice calling requires WebRTC backend!')">📞</span>
                <span onclick="alert('Video calling requires WebRTC backend!')">📹</span>
            </div>
        </div>

        <div class="chat-area" id="chat-area">
            <div>
                <div class="sender-name">System</div>
                <div class="message msg-received" style="background-color: #333; color: #ccc; font-size: 14px;">
                    End-to-end encryption simulated. Welcome to the safe zone.
                </div>
            </div>
            <div class="typing-indicator" id="typing-status">Someone is typing...</div>
        </div>

        <div class="input-area">
            <span class="action-icon" onclick="alert('Image uploads require a database storage backend!')">➕</span>
            <span class="action-icon" onclick="alert('Camera access requires HTTPS and backend media handling!')">📷</span>
            <input type="text" class="text-input" id="message-input" placeholder="Message..." oninput="simulateTyping()">
            <span class="action-icon" id="send-btn" onclick="sendMessage()">➤</span>
        </div>
    </div>

    <script>
        // Secure Passwords for the 5 members
        const users = {
            "Saba": "saba123",
            "Ilia": "ilia123",
            "Mate": "mate123",
            "Gela": "gela123",
            "Levani": "levani123"
        };

        let currentUser = "";

        function attemptLogin() {
            const selectedUser = document.getElementById('user-select').value;
            const enteredPass = document.getElementById('password-input').value;

            if (users[selectedUser] && users[selectedUser] === enteredPass) {
                currentUser = selectedUser;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('chat-screen').style.display = 'flex';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (text === "") return;

            const chatArea = document.getElementById('chat-area');
            const typingIndicator = document.getElementById('typing-status');
            
            // Create sent message
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message msg-sent';
            msgDiv.innerText = text;

            // Insert before typing indicator
            chatArea.insertBefore(msgDiv, typingIndicator);
            input.value = '';
            
            // Scroll to bottom
            chatArea.scrollTop = chatArea.scrollHeight;
            typingIndicator.style.display = 'none';

            // IMPORTANT: Right now this ONLY shows on your screen. 
            // It is not sending to a database yet.
        }

        // Simulate typing indicator
        function simulateTyping() {
            const typingIndicator = document.getElementById('typing-status');
            const input = document.getElementById('message-input');
            
            if (input.value.length > 0) {
                typingIndicator.style.display = 'block';
            } else {
                typingIndicator.style.display = 'none';
            }
        }

        // Send on Enter key
        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
